name: CV Autopilot

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  cv-autopilot:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Restore reports cache
        uses: actions/cache@v4
        with:
          path: reports
          key: cv-reports-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            cv-reports-${{ runner.os }}-${{ github.ref_name }}-

      - name: Install dependencies
        run: npm ci

      - name: Random jitter
        run: sleep $((RANDOM % 300))

      - name: Preflight CV
        run: npx ts-node --transpile-only core/preflightCv.ts

      - name: Fail fast if no IN sources
        run: |
          node -e "const fs=require('fs');const path=require('path');const dir=path.resolve('reports');const pattern=/^cv_preflight_(\\d{8})_(\\d{6})(?:_(\\d{2}))?\\.json$/;if(!fs.existsSync(dir)){console.error('reports/ not found');process.exit(1);}const files=fs.readdirSync(dir);const matches=[];for(const file of files){const m=file.match(pattern);if(m){const ts=m[1]+m[2]+(m[3]||'');matches.push({file,ts});}}if(matches.length===0){console.error('No preflight report found');process.exit(1);}matches.sort((a,b)=>b.ts.localeCompare(a.ts));const report=JSON.parse(fs.readFileSync(path.join(dir,matches[0].file),'utf8'));const inCount=report?.summary?.inCount??0;console.log(`Preflight IN count: ${inCount}`);if(inCount===0){console.error('Preflight IN count is 0. Failing fast.');process.exit(1);}"

      - name: Ingest CV
        run: DETAIL_ENRICH=1 DETAIL_ENRICH_LIMIT=10 npx ts-node --transpile-only core/ingestCv.ts

      - name: Stale cleanup
        run: npm run stale:cv

      - name: KPI report
        run: npm run kpi:cv

      - name: Regression check
        run: npm run regression:cv -- --fail-on-alert

      - name: Legacy report
        run: npm run report:cv

      - name: Upload ops artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cv-ops-artifacts
          path: |
            artifacts/cv_ingest_report.json
            artifacts/cv_drop_report.json
            artifacts/ops/*.json
            artifacts/ops/*.txt

      - name: Action summary
        run: |
          node <<'NODE'
          const fs = require("fs");
          const path = require("path");

          const summary = process.env.GITHUB_STEP_SUMMARY;
          const files = [
            ["KPI", path.resolve("artifacts/ops/cv_kpi_report.txt")],
            ["Regression", path.resolve("artifacts/ops/cv_regression_alert.txt")],
            ["Stale cleanup", path.resolve("artifacts/ops/cv_stale_cleanup.txt")]
          ];

          let out = "## CV Ops Summary\n\n";
          for (const [label, file] of files) {
            out += `### ${label}\n\n`;
            if (!fs.existsSync(file)) {
              out += "(missing)\n\n";
              continue;
            }
            out += "```\n" + fs.readFileSync(file, "utf8").trim() + "\n```\n\n";
          }
          fs.appendFileSync(summary, out);
          NODE
